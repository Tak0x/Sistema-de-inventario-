<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE INVENTARIO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <!-- Cambio de nombre solicitado -->
        <h1>SISTEMA DE INVENTARIO</h1>
        <div class="nav-item active" onclick="showSection('section-dashboard', this)">Dashboard</div>
        <div class="nav-item" onclick="showSection('section-productos', this)">Productos</div>
        <div class="nav-item" onclick="showSection('section-categorias', this)">Categorías</div>
    </div>

    <div class="main">
        <!-- El resto del contenido se mantiene igual -->
        <div id="section-dashboard" class="content-section active">
            <div class="section-title">Resumen de Inventario</div>
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Productos</h3><p id="stat-total">0</p></div>
                <div class="stat-card"><h3>Stock Crítico</h3><p id="stat-low" style="color:var(--danger)">0</p></div>
                <div class="stat-card"><h3>Valor Total</h3><p id="stat-value">$0.00</p></div>
            </div>
        </div>

        <div id="section-productos" class="content-section">
            <div class="card">
                <div class="section-title" id="formActionTitle">Registrar Nuevo Producto</div>
                <input type="hidden" id="productId">
                <div class="form-grid">
                    <div><label>Nombre del Producto</label><input type="text" id="productName"></div>
                    <div><label>Categoría</label><select id="productCategory"></select></div>
                    <div><label>Precio Unitario ($)</label><input type="number" id="productPrice" step="0.01"></div>
                    <div><label>Cantidad en Stock</label><input type="number" id="productStock"></div>
                    <div><label>Stock Mínimo (Alerta)</label><input type="number" id="productMinStock"></div>
                </div>
                <div class="button-group">
                    <button id="btnSave" class="btn-primary" onclick="saveProduct()">Guardar Producto</button>
                    <button class="btn-secondary" onclick="clearForm()">Limpiar Campos</button>
                </div>
            </div>

            <div class="card">
                <div class="section-title">Inventario Actual</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Producto</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Mín.</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="section-categorias" class="content-section">
            <div class="card">
                <div class="section-title">Gestión de Categorías</div>
                <div class="category-input-group">
                    <input type="text" id="newCategory" placeholder="Ej: Bebidas, Electrónica...">
                    <button class="btn-primary" onclick="addCategory()">Añadir Categoría</button>
                </div>
                <div id="categoryList"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
